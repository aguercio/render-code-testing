<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Set the character encoding for the document. -->
    <meta charset="utf-8" />
    <!-- Make the layout scale correctly on phones and tablets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Describe the page for the browser and search tools. -->
    <meta
      name="description"
      content="Travel Image App for Web Programming Lab 11b"
    />
    <!-- Load the font used by the app UI. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- Set the browser tab title. -->
    <title>Travel Image App</title>
  </head>
  <body>
    <!-- Show a message if JavaScript is turned off. -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- React mounts the entire application into this root element. -->
    <div id="root"></div>
  </body>
</html>
